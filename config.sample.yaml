# BAW Agent Platform Configuration (SAMPLE — generated 2026-06-12 from active config)
# Copy to ~/.baw/config.yaml and adjust as needed.
# All sensitive values use env-var references (e.g. ${DEEPSEEK_API_KEY}),
# never inline keys.

adversarial:
  angel_model: step-3.7-flash
  devil_model: kimi-k2.6
  enabled: true
  flag_threshold: 0
  warn_threshold: 2
capabilities:
  chat:
    model: step-3.7-flash
  image_generation:
    model: MiniMax-M3
  stt:
    api_key_env: STEPFUN_API_KEY
    base_url: https://api.stepfun.ai/v1
    method: auto-asr
    model: stepaudio-2.5-asr
  tts:
    config:
      api_model: stepaudio-2.5-tts
      base_url: https://api.stepfun.ai/v1
    method: model
    model: stepaudio-2.5-tts
    voice: Cantonese_GentleLady
  vision:
    model: MiniMax-M3
executor:
  model: step-3.7-flash
fact_check:
  mode: normal
max_concurrency: 10
max_tokens:
  default: 8192
  reasoning: 16384
mode: hybrid
model:
  default: step-3.7-flash
  fallback: MiniMax-M3
  route:
    enabled: true
    long_model: step-3.7-flash
    short_model: step-3.7-flash
    threshold_tokens: 8000
  task_rules:
  - match: search|product|購買|售價|價格|shop|商店|查詢|research|find|lookup
    model: step-3.7-flash
  - match: code|debug|fix|bug|error|program|script|python|node|測試|修復
    model: step-3.7-flash
  - match: vision|image|photo|圖片|相片|screenshot|截圖
    model: MiniMax-M3
  - match: write|create|build|製作|建立|generate|生成|設計
    model: step-3.7-flash
permissions:
  risk_levels:
    low:
    - tool: read_file
    - tool: web_search
    medium:
    - tool: write_file
    - tool: bash
providers:
  Azure:
    api_key_env: AZURE_SPEECH_KEY
    base_url: https://eastus.tts.speech.microsoft.com/cognitiveservices/v1
    models:
    - capabilities:
      - tts
      context_window: 4096
      id: zh-HK-HiuMaanNeural
      voice_id: zh-HK-HiuMaanNeural
  MiniMax:
    api_key_env: MINIMAX_API_KEY
    base_url: https://api.minimax.io/v1
    models:
    - capabilities:
      - chat
      - tts
      context_window: 262144
      id: MiniMax-M3
    - capabilities:
      - chat
      context_window: 262144
      id: MiniMax-M2.5
  agnes:
    api_key_env: AGNES_API_KEY
    base_url: https://apihub.agnes-ai.com/v1
    models:
    - capabilities:
      - chat
      - vision
      context_window: 131072
      id: agnes-2.0-flash
    - capabilities:
      - image_generation
      context_window: 4096
      id: agnes-image-2.1-flash
    - capabilities:
      - video_generation
      context_window: 4096
      id: agnes-video-v2.0
  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1
    models:
    - capabilities:
      - chat
      context_window: 65536
      cost_per_1m_input: 0.3
      cost_per_1m_output: 1.2
      id: deepseek-v4-flash
  kimi:
    api_key_env: MOONSHOT_API_KEY
    base_url: https://api.moonshot.ai/v1
    models:
    - capabilities:
      - chat
      context_window: 262144
      cost_per_1m_input: 0.95
      cost_per_1m_output: 4.0
      id: kimi-k2.6
      temperature: 1.0
      vision: true
  openai:
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    models:
    - capabilities:
      - image_generation
      context_window: 4096
      id: dall-e-3
    - capabilities:
      - chat
      context_window: 128000
      id: gpt-4o
  stepfun:
    api_key_env: STEPFUN_API_KEY
    base_url: https://api.stepfun.ai/v1
    models:
    - capabilities:
      - chat
      - vision
      context_window: 65536
      id: step-3.7-flash
    - capabilities:
      - chat
      context_window: 65536
      id: step-3.5-flash
    - capabilities:
      - chat
      context_window: 65536
      id: step-3.5-flash-2603
    - capabilities:
      - tts
      context_window: 4096
      id: step-tts-2
    - capabilities:
      - tts
      context_window: 4096
      id: stepaudio-2.5-tts
    - capabilities:
      - stt
      context_window: 4096
      id: stepaudio-2.5-asr
    - capabilities:
      - image_generation
      context_window: 4096
      id: step-image-edit-2
tone:
  default: casual
  profiles:
    business:
      description: 正規商業文件 — 專用語
    casual:
      description: 日常聊天吹水 — 口語短句、emoji OK
    client-doc:
      description: 客戶面向文件 — 相接 artifact
    stepwise:
      description: 逐步確認模式 — 每步彙結論
tools:
  browser:
    enabled: false
  execute_code:
    enabled: false
  image_generate:
    enabled: false
  tts:
    enabled: true
tts:
  voice: zh-HK-HiuMaanNeural
dreaming:
  schedule: 0 3 * * 0
  enabled: true
self_repair:
  auto_clean_stuck: true
  enabled: true
on_hold_tasks:
  stale_threshold_days: 7
  auto_fail_stuck: true
