model:
  default: z-ai/glm-5.2
  fallback: MiniMax-M2.5
  task_rules:
  - match: search|product|購買|價錢|價格|price|shop|商店|查詢|research|find|lookup
    model: deepseek-v4-flash
  - match: code|debug|fix|bug|error|program|script|python|node|測試|修復
    model: deepseek-v4-flash
  - match: vision|image|photo|圖片|相片|screenshot|截圖
    model: MiniMax-M3
  - match: write|create|build|製作|建立|generate|生成|設計|design
    model: deepseek-v4-flash
  cost_tiers:
    subscription:
    - MiniMax-M2.5
    - MiniMax-M2.7
    - MiniMax-M3
    - MiniMax-M2.7-highspeed
    - MiniMax-M2.5-highspeed
    - step-3.7-flash
    pay_per_use:
    - deepseek-v4-flash
    - deepseek-v4-pro
    - openrouter/anthropic/claude-opus-4.8
    - openrouter/anthropic/claude-sonnet-4.6
    - openrouter/openai/gpt-5.5-pro
    - openrouter/qwen/qwen3.7-plus
    - openrouter/deepseek/deepseek-v4-pro
    preferential:
    - step-3.7-flash
    - MiniMax-M2.5
    - MiniMax-M2.7
    - MiniMax-M3
    - deepseek-v4-flash
  executor: minimax m2.5
  image: minimax image 01
  preferential:
  - step-3.7-flash
  - MiniMax-M2.5
  - MiniMax-M2.7
  - MiniMax-M3
  - deepseek-v4-flash
  retry:
    exponential_backoff: true
    max_attempts: 3
    timeout: 30
  stt: grok
  tts: minimax
executor:
  model: MiniMax-M2.5
capabilities:
  vision:
    model: MiniMax-M3
    fallback: MiniMax-M2.5
  chat:
    model: deepseek-v4-flash
  image_generation:
    model: MiniMax-image-01
    provider: minimax
  stt:
    method: hybrid
    model: grok-stt
    base_url: https://api.stepfun.ai/step_plan/v1
    api_key_env: STEPFUN_API_KEY
    fallback:
      api_key_env: STEPFUN_API_KEY
      base_url: https://api.stepfun.ai/step_plan/v1
      method: auto-asr
      model: stepaudio-2.5-asr
    primary:
      api_key_env: XAI_API_KEY
      base_url: https://api.x.ai/v1
      method: auto-asr
      model: grok-stt
  tts:
    model: stepaudio-2.5-tts
    method: edge
    voice: Cantonese_GentleLady
  browser:
    model: step-3.7-flash
  delegate_task:
    model: step-3.7-flash
  web_extract:
    model: step-3.7-flash
  web_browser:
    model: step-3.7-flash
providers:
  deepseek:
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    models:
    - capabilities:
      - chat
      context_window: 1000000
      cost_per_1m_input: 0.3
      cost_per_1m_output: 1.2
      id: deepseek-v4-flash
    - capabilities:
