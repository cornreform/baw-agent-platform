# BAW Agent Platform Configuration (Sample)
# Copy to ~/.baw/config.yaml and fill in your API keys

model:
  default: "kimi-k2.6"
  fallback: "deepseek-v4-flash"

providers:
  # ── Kimi (Moonshot AI) — Primary ──────────────────────────────
  kimi:
    base_url: "https://api.moonshot.ai/v1"
    api_key_env: "MOONSHOT_API_KEY"
    models:
      - id: "kimi-k2.6"
        context_window: 262144
        vision: true
        audio_input: false
        cost_per_1m_input: 0.95
        cost_per_1m_output: 4.00

  # ── DeepSeek — Fallback ───────────────────────────────────────
  deepseek:
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    models:
      - id: "deepseek-v4-flash"
        context_window: 65536
        vision: false
        audio_input: false
        cost_per_1m_input: 0.30
        cost_per_1m_output: 1.20

  minimax:
    base_url: "https://api.minimax.io/v1"
    api_key_env: "MINIMAX_API_KEY"
    models:
      - id: "MiniMax-M3"
        context_window: 1048576
        vision: true
        audio_input: false
        cost_per_1m_input: 2.00
        cost_per_1m_output: 8.00

# ── Speech-to-Text ─────────────────────────────────────────────
# STT method: models with `audio_input: true` use their native audio API.
# If no model supports audio input, configure one of these methods:
#
# Option A: faster-whisper (local, free, no API key)
#   pip install faster-whisper
#   stt:
#     method: "faster-whisper"
#     model: "base"       # tiny / base / small / medium / large-v3
#
# Option B: OpenAI Whisper API (paid, requires API key)
#   stt:
#     method: "openai-whisper"
#     api_key_env: "OPENAI_API_KEY"
#     model: "whisper-1"
#
# Option C: Google Cloud Speech-to-Text
#   stt:
#     method: "google-speech"
#     credentials_path: "/path/to/service-account.json"
#     language: "yue-Hant-HK"  # Cantonese
#
# If no STT is configured and no model has audio_input, BAW will
# tell you what's missing and suggest installation steps.
# stt:

permissions:
  risk_levels:
    high:
      - path: "/etc/*"
      - path: "/usr/*"
      - cmd_prefix: "rm -rf"
      - cmd_prefix: "sudo"
      - cmd_prefix: "dd if="
    medium:
      - tool: "write_file"
      - tool: "bash"
    low:
      - tool: "read_file"
      - tool: "web_search"

tone:
  default: "casual"
  profiles:
    casual:
      description: "日常粵語口語、短句、emoji OK"
    business:
      description: "客戶文件 — 合作邀約 tone"
    client-doc:
      description: "Client facing — 零 comment、直接出 artifact"
    teaching:
      description: "教學模式 — 直接俾 .md"
    ot-rt:
      description: "快速執行 — 做完先報"
    stepwise:
      description: "逐步執行 — 每步 confirm"

fact_check:
  mode: "normal"

adversarial:
  enabled: true
  flag_threshold: 0
  warn_threshold: 2

