    model: MiniMax-M2.5
  image_generation:
    model: MiniMax-M3
  stt:
    api_key_env: XAI_API_KEY
    base_url: https://api.x.ai/v1
    language: zh
    method: auto-asr
    model: grok-stt
  tts:
    config:
      api_model: stepaudio-2.5-tts
      base_url: https://api.stepfun.ai/v1
    method: model
    model: stepaudio-2.5-tts
    voice: Cantonese_GentleLady
  vision:
    model: MiniMax-M3
  web_browser:
    model: step-3.7-flash
  web_extract:
    model: step-3.7-flash
evolve:
  known_issues:
  - detected: '2026-06-16T15:45:01.097470'
    rate: 6/7
    tool: write_file
executor:
  model: step-3.7-flash
fact_check:
  mode: normal
mode: quick
model:
  default: deepseek-v4-flash
  fallback: MiniMax-M3
  task_rules:
  - match: search|product|購買|價錢|價格|price|shop|商店|查詢|research|find|lookup
    model: step-3.7-flash
  - match: code|debug|fix|bug|error|program|script|python|node|測試|修復
    model: step-3.7-flash
  - match: vision|image|photo|圖片|相片|screenshot|截圖
    model: step-3.7-flash
  - match: write|create|build|製作|建立|generate|生成|設計|design
    model: step-3.7-flash
permissions:
  risk_levels:
    high:
    - path: /etc/*
    - path: /usr/*
    - path: /boot/*
    - path: '*.pem'
    - path: '*.key'
    - path: .env
    - cmd_prefix: rm -rf
    - cmd_prefix: sudo
    - cmd_prefix: dd if=
    low:
    - tool: read_file
    - tool: web_search
    medium:
    - tool: write_file
    - tool: bash
