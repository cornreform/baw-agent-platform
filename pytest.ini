[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may use filesystem/network)
    e2e: End-to-end tests (full workflows)
    slow: Tests that take >5s
    requires_api: Tests requiring external API keys
    requires_telegram: Tests requiring Telegram bot token
    watchdog: Watchdog/health monitoring tests
    evolve: Self-evolution engine tests
    security: Security/permission tests
    performance: Performance/benchmark tests
    regression: Regression tests for known bugs
