# BAW Scheduled Tasks
# Cron format: min hour day month weekday
# ⚠️ All times in HKT (Asia/Hong_Kong) — set cron.timezone in config.yaml
#
# Nightly maintenance window: 02:00-05:00 HKT (45-min gaps)
# Weekly maintenance: Mon 05:00-06:00
# Reports auto-delivered on next user interaction via startup hook

- name: daily-backup
  cron: "0 2 * * *"
  command: "!python3 -c \"import sys; sys.path.insert(0,'/app'); from core.backup import create_backup; r=create_backup(); sm=r.get('size_mb',0); print(f'Backup: {sm}MB')\""
  description: "02:00 HKT — Daily backup of config/memory/skills (keeps last 7)"
  enabled: true

- name: nightly-health-check
  cron: "0 3 * * *"
  command: "!python3 -c \"import sys; sys.path.insert(0,'/app'); from core.doctor import cmd_doctor; from pathlib import Path; cmd_doctor(Path.home() / '.baw', fix=False); print('Health check completed')\""
  description: "03:00 HKT — Full self-diagnose: provider health, disk, config"
  enabled: true

- name: daily-memory-decay
  cron: "30 3 * * *"
  command: "!python3 -c \"import sys; sys.path.insert(0,'/app'); from core.memory import MemoryStore; from pathlib import Path; m=MemoryStore(Path.home() / '.baw'); m.decay(); print('Memory decay completed')\""
  description: "03:30 HKT — Memory store score decay for old entries"
  enabled: true

- name: daily-kg-extract
  cron: "0 4 * * *"
  command: "!python3 -c \"import sys; sys.path.insert(0,'/app'); from tools.knowledge_graph import extract_from_memory; print(extract_from_memory())\""
  description: "04:00 HKT — Auto-populate knowledge graph from memory store"
  enabled: true

- name: daily-evolve-analyze
  cron: "30 4 * * *"
  command: "!python3 -c \"import sys; sys.path.insert(0,'/app'); from core.evolve import analyze, auto_optimize, flush_behavior; flush_behavior(); r=auto_optimize(dry_run=True); pf=r.get('patterns_found',0); qc=r.get('queued_count',0); print(f'Evolve analyze: {pf} patterns, {qc} queued')\""
  description: "04:30 HKT — Analyze behavior, extract patterns, queue SOUL.md patches"
  enabled: true

- name: weekly-self-evolution
  cron: "0 5 * * 0"
  command: "!python3 /app/scripts/self_harness_eval.py"
  description: "Sun 05:00 HKT — Full self-harness evaluation: codebase scan, health check, improvement proposals"
  enabled: true

- name: weekly-kg-curation
  cron: "0 5 * * 1"
  command: "!python3 -c \"import sys; sys.path.insert(0,'/app'); from tools.kg_curator import curate; r=curate(action='curate',dry_run=False); from pathlib import Path; report=Path.home()/'.baw'/'reports'/'weekly_kg_report.txt'; report.parent.mkdir(exist_ok=True); report.write_text(r); print(r)\""
  description: "Mon 05:00 HKT — Weekly KG curation: consolidate noise, remove orphans"
  enabled: true

- name: weekly-memory-quality
  cron: "15 5 * * 1"
  command: "!python3 -c \"import sys; sys.path.insert(0,'/app'); from tools.memory_quality import _handler; from pathlib import Path; r=_handler({'action':'both'}); report=Path.home()/'.baw'/'reports'/'weekly_quality_report.txt'; report.parent.mkdir(exist_ok=True); report.write_text(r); print(r)\""
  description: "Mon 05:15 HKT — Weekly memory quality report (loss score)"
  enabled: true

- name: weekly-session-synthesis
  cron: "30 5 * * 1"
  command: "!python3 -c \"import sys; sys.path.insert(0,'/app'); from tools.session_synthesis import synthesize; from pathlib import Path; r=synthesize(days_back=7,store=True); report=Path.home()/'.baw'/'reports'/'weekly_synthesis_report.txt'; report.parent.mkdir(exist_ok=True); report.write_text(r); print(r)\""
  description: "Mon 05:30 HKT — Weekly cross-session pattern synthesis"
  enabled: true

- name: daily-self-report
  cron: "0 10 * * *"
  command: "!python3 -c \"import sys; sys.path.insert(0,'/app'); from core.scheduler import Scheduler; from pathlib import Path; s=Scheduler(Path.home() / '.baw'); r=s.status_report()+chr(10)+s.cron_status_report(); report=Path.home()/'.baw'/'reports'/'daily_health_report.txt'; report.parent.mkdir(exist_ok=True); report.write_text(r); print(r)\""
  description: "10:00 HKT — Morning report: scheduled tasks + recent failures"
  enabled: true
