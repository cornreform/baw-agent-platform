# BAW Bot — Docker Compose
# Replaces systemd baw-telegram.service.
#
# USAGE:
#   1. Copy this file or edit paths below to match YOUR home directory
#   2. Ensure ~/.baw/.env and ~/.baw/telegram.env exist (see SETUP.md)
#   3. Run: docker compose up -d
#
services:
  baw-telegram:
    build: .
    container_name: baw-telegram
    restart: unless-stopped
    # ── Volumes ──
    # Replace /home/YOUR_USERNAME with your actual home directory
    # Example: if your username is "pi", use /home/pi/.baw
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins/docker-compose:/usr/libexec/docker/cli-plugins/docker-compose:ro
      - ~/.baw:/home/baw/.baw
      - ~/.mmx:/home/baw/.mmx
      - /home/radxa/baw:/app                                    # live code mount — no rebuild needed
    # Load Telegram token + API keys from BAW's own env files
    env_file:
      - ~/.baw/telegram.env
      - ~/.baw/.env
    network_mode: bridge
    group_add:
      - "988"  # docker group GID — install.sh auto-detects this; change if your Docker GID differs (run: getent group docker | cut -d: -f3)
    environment:
      - BAW_HOME=/app
      - BAW_RUNTIME_HOME=/home/baw/.baw
      - BAW_ADMIN_CHAT_ID=565235243
      - PYTHONPATH=/app
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    # ── Healthcheck ──
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline 2>/dev/null | tr '\\0' ' ' | grep -q python3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 35s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
