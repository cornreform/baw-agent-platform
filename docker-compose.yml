# BAW Bot — Docker Compose
# Replaces systemd baw-telegram.service.
# Fully isolated from Hermes — own Python, own env, own network namespace.
services:
  baw-telegram:
    build: .
    container_name: baw-telegram
    restart: unless-stopped
    # Mount BAW's persistent data (sessions, memory, vault, config)
    volumes:
      - /home/user/.baw:/home/baw/.baw
    # Load Telegram token + API keys from BAW's own env files
    env_file:
      - /home/user/.baw/telegram.env
      - /home/user/.baw/.env
    # No Hermes paths. No host network. No privileged.
    network_mode: bridge
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
