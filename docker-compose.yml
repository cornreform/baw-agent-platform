# BAW Bot — Docker Compose
# Replaces systemd baw-telegram.service.
# Fully isolated — own Python, own env, own network namespace.
services:
  baw-telegram:
    build: .
    container_name: baw-telegram
    restart: unless-stopped
    # Mount BAW's persistent data (sessions, memory, vault, config)
    volumes:
      - /home/user/.baw:/home/baw/.baw
      - /home/user/.mmx:/home/baw/.mmx
    # Load Telegram token + API keys from BAW's own env files
    env_file:
      - /home/user/.baw/telegram.env
      - /home/user/.baw/.env
    # No external paths. No host network. No privileged.
    network_mode: bridge
    # ── Resource limits (grok-4.1 A5) ──
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    # ── Healthcheck: real BAW status probe, auto-restart on 3 failures ──
    healthcheck:
      test: ["CMD-SHELL", "cd /app && python3 -c 'from tools import register_all; register_all(); from core.tools import list_tools; t=list_tools(); exit(0 if len(t)>=10 else 1)'"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
