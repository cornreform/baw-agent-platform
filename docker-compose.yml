# BAW Bot — Docker Compose
# Replaces systemd baw-telegram.service.
# Fully isolated from Hermes — own Python, own env, own network namespace.
services:
  baw-telegram:
    build: .
    container_name: baw-telegram
    restart: unless-stopped
    # Mount BAW's persistent data (sessions, memory, vault, config)
    volumes:
      - /home/user/.baw:/home/baw/.baw
    # Load Telegram token + API keys from BAW's own env files
    env_file:
      - /home/user/.baw/telegram.env
      - /home/user/.baw/.env
    # No Hermes paths. No host network. No privileged.
    network_mode: bridge
    # ── Resource limits (grok-4.1 A5) ──
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    # ── Healthcheck: baw status every 30s, auto-restart on 3 failures ──
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import sys; sys.exit(0)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
